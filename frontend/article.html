<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>مُوجز 24 | قراءة الخبر</title>
  <meta name="description" content="اقرأ الخبر كاملاً على مُوجز 24">
  <script>
    (function () {
      try {
        var theme = localStorage.getItem('mojaz24-theme') || 'light';
        var fontScale = parseFloat(localStorage.getItem('mojaz24-font') || '1');
        var root = document.documentElement;
        root.setAttribute('data-theme', theme);
        root.style.colorScheme = theme === 'dark' ? 'dark' : 'light';
        if (!Number.isNaN(fontScale)) {
          root.style.fontSize = (Math.max(0.85, Math.min(1.3, fontScale)) * 16) + 'px';
        }
      } catch (e) {}
    })();
  </script>
  <style>
    html[data-theme="dark"], html[data-theme="dark"] body {
      background-color: #0d1117;
      color: #e6edf3;
    }
    html[data-theme="light"], html[data-theme="light"] body {
      background-color: #f5f6fa;
      color: #1a1d2e;
    }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&family=Readex+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="style.css">
  <style>
    /* ===== ARTICLE PAGE STYLES ===== */
    .article-page {
      max-width: 820px;
      margin: 40px auto;
      padding: 0 20px 60px;
    }

    /* Back button */
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--primary);
      font-size: 0.9rem;
      font-weight: 600;
      text-decoration: none;
      margin-bottom: 28px;
      padding: 8px 16px;
      border-radius: var(--radius-full);
      background: rgba(67, 97, 238, 0.07);
      border: 1px solid rgba(67, 97, 238, 0.15);
      transition: background var(--transition), transform var(--transition);
    }
    .back-btn:hover {
      background: rgba(67, 97, 238, 0.14);
      transform: translateX(3px);
    }
    [data-theme="dark"] .back-btn {
      background: rgba(108, 138, 255, 0.1);
      border-color: rgba(108, 138, 255, 0.2);
      color: var(--primary);
    }

    /* Article card */
    .article-card {
      background: var(--bg-card);
      border-radius: var(--radius);
      box-shadow: var(--shadow-lg);
      overflow: hidden;
      border: 1px solid var(--border);
    }

    /* Hero image */
    .article-hero-img {
      width: 100%;
      max-height: 480px;
      object-fit: cover;
      display: block;
    }

    /* Article body */
    .article-body {
      padding: 36px 40px 40px;
    }
    @media (max-width: 600px) {
      .article-body { padding: 24px 20px 28px; }
    }

    /* Category + meta top row */
    .article-top-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }

    /* Title */
    .article-title {
      font-size: clamp(1.5rem, 4vw, 2.1rem);
      font-weight: 800;
      color: var(--text-1);
      line-height: 1.45;
      margin-bottom: 20px;
    }

    /* Meta bar */
    .article-meta-bar {
      display: flex;
      align-items: center;
      gap: 18px;
      flex-wrap: wrap;
      padding: 14px 0;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      margin-bottom: 32px;
      color: var(--text-3);
      font-size: 0.87rem;
    }
    .article-meta-bar .meta-item {
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .article-meta-bar svg {
      flex-shrink: 0;
      opacity: 0.75;
    }

    /* Content image inside article */
    .article-content-image {
      width: 100%;
      border-radius: var(--radius-sm);
      margin: 24px 0;
      object-fit: cover;
      max-height: 380px;
    }

    /* Content paragraphs */
    .article-content {
      color: var(--text-2);
      font-size: 1.08rem;
      line-height: 1.95;
    }
    .article-content p {
      margin-bottom: 20px;
    }
    .article-content p:last-child {
      margin-bottom: 0;
    }

    /* Video embed */
    .article-video-wrap {
      margin: 28px 0;
      border-radius: var(--radius-sm);
      overflow: hidden;
      aspect-ratio: 16/9;
      background: #000;
    }
    .article-video-wrap iframe,
    .article-video-wrap video {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* Share bar */
    .article-share {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 36px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
    }
    .article-share span {
      font-weight: 700;
      color: var(--text-1);
      font-size: 0.92rem;
    }
    .share-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: var(--radius-full);
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: opacity var(--transition), transform var(--transition);
      text-decoration: none;
      font-family: 'Cairo', sans-serif;
    }
    .share-btn:hover { opacity: 0.85; transform: translateY(-1px); }
    .share-copy { background: var(--bg-muted); color: var(--text-1); }
    .share-facebook { background: #1877f2; color: #fff; }
    .share-twitter  { background: #1da1f2; color: #fff; }
    .share-whatsapp { background: #25d366; color: #fff; }

    /* Not found */
    .article-not-found {
      text-align: center;
      padding: 80px 20px;
      color: var(--text-3);
    }
    .article-not-found h2 {
      font-size: 1.5rem;
      margin-bottom: 12px;
      color: var(--text-1);
    }

    /* Related news */
    .related-section {
      margin-top: 40px;
    }
    .related-section h3 {
      font-size: 1.15rem;
      font-weight: 800;
      color: var(--text-1);
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .related-section h3::after {
      content: '';
      flex: 1;
      height: 2px;
      background: var(--border-strong);
      border-radius: 2px;
    }
    .related-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px;
    }
    .related-card {
      background: var(--bg-card);
      border-radius: var(--radius-sm);
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--border);
      overflow: hidden;
      text-decoration: none;
      display: block;
      transition: box-shadow var(--transition), transform var(--transition);
    }
    .related-card:hover {
      box-shadow: var(--shadow-md);
      transform: translateY(-3px);
    }
    .related-card img {
      width: 100%;
      height: 130px;
      object-fit: cover;
    }
    .related-card-body {
      padding: 12px 14px;
    }
    .related-card-body h4 {
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--text-1);
      line-height: 1.5;
      margin-top: 6px;
    }

    /* Loading skeleton */
    .skeleton {
      background: linear-gradient(90deg, var(--bg-muted) 25%, var(--border) 50%, var(--bg-muted) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 6px;
    }
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
  </style>
</head>

  <script>
    // ===== ARTICLE PAGE LOGIC =====
    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str || '';
      return div.innerHTML;
    }

    function createPlaceholder(label) {
      return `data:image/svg+xml;charset=UTF-8,${encodeURIComponent(
        `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675">
          <defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#1d3557"/><stop offset="100%" stop-color="#457b9d"/>
          </linearGradient></defs>
          <rect width="1200" height="675" fill="url(#g)"/>
          <text x="600" y="345" font-family="Cairo, Arial" font-size="58" fill="#ffffff" text-anchor="middle">${label}</text>
        </svg>`
      )}`;
    }

    function formatDate(ts) {
      if (!ts) return 'الآن';
      return new Date(ts).toLocaleString('ar-EG', {
        weekday: 'long', day: 'numeric', month: 'long', year: 'numeric',
        hour: 'numeric', minute: '2-digit'
      });
    }

    function estimateReadTime(content) {
      const words = (content || '').trim().split(/\s+/).filter(Boolean).length;
      return `${Math.max(1, Math.ceil(words / 180))} دقيقة قراءة`;
    }

    function getTagClass(category) {
      const v = (category || '').trim();
      if (v === 'عاجل') return 'tag-urgent';
      if (v === 'سياسة') return 'tag-politics';
      if (v === 'اقتصاد') return 'tag-economy';
      if (v === 'عالمي') return 'tag-world';
      return 'tag-accent';
    }

    function getNewsId(news) {
      return news?._id || news?.id || '';
    }

    function getVideoEmbed(url) {
      if (!url) return '';
      // YouTube
      const ytMatch = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([^&\s]+)/);
      if (ytMatch) {
        return `<div class="article-video-wrap"><iframe src="https://www.youtube.com/embed/${ytMatch[1]}" allowfullscreen></iframe></div>`;
      }
      // Generic video URL
      return `<div class="article-video-wrap"><video controls src="${escapeHtml(url)}"></video></div>`;
    }

    async function renderArticle() {
      const params = new URLSearchParams(window.location.search);
      const id = params.get('id');
      const page = document.getElementById('articlePage');

      if (!id || !window.MojazNewsStore) {
        page.innerHTML = `<div class="article-not-found"><h2>لم يُعثر على الخبر</h2><p>الخبر غير موجود أو تم حذفه.</p><a href="index.html" class="back-btn" style="margin-top:20px;display:inline-flex;">← العودة للرئيسية</a></div>`;
        return;
      }

await window.MojazNewsStore.ready().catch(() => null);
const allNews = window.MojazNewsStore.getAll();
const news = allNews.find(n => String(getNewsId(n)) === String(id));

if (!news) {
  page.innerHTML = `<div class="article-not-found"><h2>لم يُعثر على الخبر</h2><p>الخبر غير موجود أو تم حذفه.</p><a href="index.html" class="back-btn" style="margin-top:20px;display:inline-flex;">← العودة للرئيسية</a></div>`;
  return;
}

      // Update page title
      document.title = `${news.title} | مُوجز 24`;

      // Build paragraphs
      const paragraphs = (news.content || '')
        .split(/\n{2,}|\r\n\r\n/)
        .map(p => p.trim()).filter(Boolean);

      // Content image (shown between paragraphs)
      const contentImageHtml = news.contentImage
        ? `<img src="${escapeHtml(news.contentImage)}" alt="${escapeHtml(news.title)}" class="article-content-image" loading="lazy">`
        : '';

      // Video section
      let videoHtml = '';
      if (news.videoFile) {
        videoHtml = `<div class="article-video-wrap"><video controls src="${escapeHtml(news.videoFile)}"></video></div>`;
      } else if (news.video) {
        videoHtml = getVideoEmbed(news.video);
      }

      // Split paragraphs around the middle to insert content image
      const mid = Math.ceil(paragraphs.length / 2);
      const firstHalf = paragraphs.slice(0, mid).map(p => `<p>${escapeHtml(p)}</p>`).join('');
      const secondHalf = paragraphs.slice(mid).map(p => `<p>${escapeHtml(p)}</p>`).join('');

      // Related news (same category, exclude current)
      const related = allNews
        .filter(n => String(getNewsId(n)) !== String(id) && n.category === news.category)
        .slice(0, 3);

      const relatedHtml = related.length ? `
        <div class="related-section">
          <h3>أخبار ذات صلة</h3>
          <div class="related-grid">
            ${related.map(r => `
              <a class="related-card" href="article.html?id=${encodeURIComponent(getNewsId(r))}">
                <img src="${escapeHtml(r.image || r.contentImage || createPlaceholder('موجز 24'))}" alt="${escapeHtml(r.title)}" loading="lazy">
                <div class="related-card-body">
                  <span class="tag tag-sm ${getTagClass(r.category)}">${escapeHtml(r.category || 'خبر')}</span>
                  <h4>${escapeHtml(r.title)}</h4>
                </div>
              </a>
            `).join('')}
          </div>
        </div>` : '';

      // Share URL
      const shareUrl = encodeURIComponent(window.location.href);
      const shareTitle = encodeURIComponent(news.title);

      page.innerHTML = `
        <a href="javascript:history.back()" class="back-btn">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>
          رجوع
        </a>

        <div class="article-card">
          ${news.image ? `<img src="${escapeHtml(news.image)}" alt="${escapeHtml(news.title)}" class="article-hero-img" loading="lazy">` : ''}
          <div class="article-body">
            <div class="article-top-meta">
              <span class="tag ${getTagClass(news.category)}">${escapeHtml(news.category || 'خبر')}</span>
            </div>
            <h1 class="article-title">${escapeHtml(news.title)}</h1>
            <div class="article-meta-bar">
              <span class="meta-item">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                ${escapeHtml(formatDate(news.createdAt))}
              </span>
              <span class="meta-item">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 7v14"/><path d="M3 18a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1h5a4 4 0 0 1 4 4 4 4 0 0 1 4-4h5a1 1 0 0 1 1 1v13a1 1 0 0 1-1 1h-6a3 3 0 0 0-3 3 3 3 0 0 0-3-3z"/></svg>
                ${escapeHtml(estimateReadTime(news.content))}
              </span>
            </div>

            <div class="article-content">
              ${firstHalf}
              ${contentImageHtml}
              ${videoHtml}
              ${secondHalf}
            </div>

            <div class="article-share">
              <span>شارك الخبر:</span>
              <button class="share-btn share-copy" onclick="copyLink()">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>
                نسخ الرابط
              </button>
              <a class="share-btn share-facebook" href="https://www.facebook.com/sharer/sharer.php?u=${shareUrl}" target="_blank" rel="noopener">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/></svg>
                فيسبوك
              </a>
              <a class="share-btn share-twitter" href="https://twitter.com/intent/tweet?text=${shareTitle}&url=${shareUrl}" target="_blank" rel="noopener">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 4s-.7 2.1-2 3.4c1.6 10-9.4 17.3-18 11.6 2.2.1 4.4-.6 6-2C3 15.5.5 9.6 3 5c2.2 2.6 5.6 4.1 9 4-.9-4.2 4-6.6 7-3.8 1.1 0 3-1.2 3-1.2z"/></svg>
                تويتر
              </a>
              <a class="share-btn share-whatsapp" href="https://wa.me/?text=${shareTitle}%20${shareUrl}" target="_blank" rel="noopener">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
                واتساب
              </a>
            </div>
          </div>
        </div>

        ${relatedHtml}
      `;
    }

    function copyLink() {
      navigator.clipboard.writeText(window.location.href).then(() => {
        const toast = document.getElementById('toast');
        if (toast) {
          toast.textContent = '✓ تم نسخ الرابط';
          toast.classList.add('show');
          setTimeout(() => toast.classList.remove('show'), 2500);
        }
      });
    }

    // Search redirect
    document.addEventListener('DOMContentLoaded', () => {
      renderArticle().catch(() => {});

      const searchInput = document.getElementById('searchInput');
      if (searchInput) {
        searchInput.addEventListener('keydown', e => {
          if (e.key === 'Enter' && searchInput.value.trim()) {
            window.location.href = `category.html?search=${encodeURIComponent(searchInput.value.trim())}`;
          }
        });
      }
    });
  </script>
