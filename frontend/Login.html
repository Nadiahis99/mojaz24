<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل الدخول | مُوجز 24</title>
  <meta name="description" content="تسجيل دخول فريق التحرير - مُوجز 24">
  <script>
    (function () {
      try {
        var s = sessionStorage.getItem('mojaz24-session');
        if (s) { var p = JSON.parse(s); if (p && (p.role==='admin'||p.role==='journalist')) window.location.replace('admin.html'); }
      } catch(e){}
    })();
    (function () {
      try {
        var theme = localStorage.getItem('mojaz24-theme') || 'light';
        document.documentElement.setAttribute('data-theme', theme);
        document.documentElement.style.colorScheme = theme === 'dark' ? 'dark' : 'light';
      } catch (e) {}
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent:       #c8a96e;
      --accent-dark:  #a8893e;
      --bg:           #f5f6fa;
      --surface:      #ffffff;
      --border:       #e2e4eb;
      --text:         #1a1d2e;
      --text-muted:   #6b7280;
      --error:        #e53e3e;
      --success:      #38a169;
      --shadow:       0 4px 24px rgba(0,0,0,.08);
      --radius:       14px;
    }
    [data-theme="dark"] {
      --bg:       #0d1117;
      --surface:  #161b22;
      --border:   #30363d;
      --text:     #e6edf3;
      --text-muted: #8b949e;
      --shadow:   0 4px 24px rgba(0,0,0,.4);
    }

    body {
      font-family: 'Cairo', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      position: relative;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 70% 50% at 20% 20%, rgba(200,169,110,.12) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 80%, rgba(200,169,110,.08) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    .login-card {
      position: relative;
      z-index: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      width: 100%;
      max-width: 440px;
      padding: 48px 40px 40px;
      animation: fadeUp .45s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .login-logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .login-logo .logo-text {
      font-size: 2.2rem;
      font-weight: 900;
      letter-spacing: -1px;
      line-height: 1;
    }
    .logo-primary { color: var(--text); }
    .logo-accent  { color: var(--accent); }
    .login-logo .tagline {
      font-size: .78rem;
      color: var(--text-muted);
      margin-top: 4px;
      letter-spacing: .5px;
    }
    .login-logo .lock-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 52px;
      height: 52px;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 100%);
      border-radius: 50%;
      margin-bottom: 16px;
      box-shadow: 0 4px 16px rgba(200,169,110,.3);
    }

    .login-title {
      text-align: center;
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 28px;
    }

    .field { margin-bottom: 18px; }
    .field label {
      display: block;
      font-size: .82rem;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 7px;
    }
    .field-input-wrap { position: relative; }
    .field-input-wrap svg {
      position: absolute;
      top: 50%;
      right: 14px;
      transform: translateY(-50%);
      color: var(--text-muted);
      pointer-events: none;
    }
    .field input {
      width: 100%;
      padding: 11px 42px 11px 14px;
      font-family: 'Cairo', sans-serif;
      font-size: .92rem;
      background: var(--bg);
      color: var(--text);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    .field input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(200,169,110,.15);
    }
    .field input.error { border-color: var(--error); }

    .login-btn {
      width: 100%;
      padding: 13px;
      font-family: 'Cairo', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 100%);
      color: #fff;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity .2s, transform .15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .login-btn:hover  { opacity: .92; }
    .login-btn:active { transform: scale(.98); }
    .login-btn:disabled { opacity: .6; cursor: not-allowed; }

    .error-msg {
      display: none;
      align-items: center;
      gap: 8px;
      background: rgba(229,62,62,.1);
      border: 1px solid rgba(229,62,62,.3);
      color: var(--error);
      font-size: .84rem;
      padding: 10px 14px;
      border-radius: 9px;
      margin-top: 14px;
      animation: shake .35s ease;
    }
    .error-msg.show { display: flex; }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%,60%  { transform: translateX(-6px); }
      40%,80%  { transform: translateX(6px); }
    }

    .role-badges {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }
    .role-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: .74rem;
      font-weight: 600;
      padding: 4px 12px;
      border-radius: 20px;
      border: 1px solid var(--border);
      color: var(--text-muted);
      background: var(--bg);
    }
    .role-badge.admin    { border-color: rgba(200,169,110,.5); color: var(--accent-dark); }
    .role-badge.journalist { border-color: rgba(56,161,105,.5); color: var(--success); }
    .role-badge-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: currentColor;
    }

    .theme-toggle-mini {
      position: fixed;
      top: 16px;
      left: 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-muted);
      border-radius: 50%;
      width: 38px;
      height: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 10;
      transition: background .2s;
    }
    .theme-toggle-mini:hover { background: var(--border); }

    .back-link {
      text-align: center;
      margin-top: 20px;
      font-size: .82rem;
      color: var(--text-muted);
    }
    .back-link a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }
    .back-link a:hover { text-decoration: underline; }

    @media (max-width: 480px) {
      .login-card { padding: 36px 24px 32px; }
    }
  </style>
</head>
<body>
  <button class="theme-toggle-mini" id="themeToggle" title="تغيير المظهر" aria-label="تبديل الوضع الداكن">
    <svg id="sunIcon" xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
    <svg id="moonIcon" xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
  </button>

  <div class="login-card">
    <div class="login-logo">
      <div class="lock-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      </div>
      <div class="logo-text">
        <span class="logo-primary">مُوجز</span><span class="logo-accent"> 24</span>
      </div>
      <div class="tagline">بوابة فريق التحرير</div>
    </div>

    <div class="role-badges">
      <span class="role-badge admin"><span class="role-badge-dot"></span>مدير</span>
      <span class="role-badge journalist"><span class="role-badge-dot"></span>صحفي</span>
    </div>

    <h2 class="login-title">تسجيل الدخول</h2>

    <form id="loginForm" autocomplete="on" novalidate>
      <div class="field">
        <label for="username">اسم المستخدم</label>
        <div class="field-input-wrap">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
          <input type="text" id="username" name="username" placeholder="أدخل اسم المستخدم" autocomplete="username" required>
        </div>
      </div>

      <div class="field">
        <label for="password">كلمة المرور</label>
        <div class="field-input-wrap">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="18" height="11" x="3" y="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <input type="password" id="password" name="password" placeholder="أدخل كلمة المرور" autocomplete="current-password" required>
        </div>
      </div>

      <button type="submit" class="login-btn" id="loginBtn">
        <svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
        دخول
      </button>

      <div class="error-msg" id="errorMsg">
        <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <span id="errorText">بيانات غير صحيحة</span>
      </div>
    </form>

    <div class="back-link">
      <a href="index.html">← العودة إلى الرئيسية</a>
    </div>
  </div>

  <script src="api.js"></script>
  <script src="Auth.js"></script>
  <script>
    const form = document.getElementById('loginForm');
    const errorMsg = document.getElementById('errorMsg');
    const errorTxt = document.getElementById('errorText');
    const loginBtn = document.getElementById('loginBtn');

    form.addEventListener('submit', async function (e) {
      e.preventDefault();
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;

      errorMsg.classList.remove('show');
      loginBtn.disabled = true;
      loginBtn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg> جارٍ التحقق...';

      const result = await MojazAuth.login(username, password);
        if (result.success) {
          loginBtn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg> تم الدخول!';
          setTimeout(function () {
            window.location.href = 'admin.html';
          }, 600);
        } else {
          loginBtn.disabled = false;
          loginBtn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg> دخول';
          errorTxt.textContent = result.message;
          errorMsg.classList.add('show');
          document.getElementById('username').classList.add('error');
          document.getElementById('password').classList.add('error');
        }
    });

    ['username', 'password'].forEach(function(id) {
      document.getElementById(id).addEventListener('input', function() {
        this.classList.remove('error');
        errorMsg.classList.remove('show');
      });
    });

    var themeBtn = document.getElementById('themeToggle');
    var sunIcon = document.getElementById('sunIcon');
    var moonIcon = document.getElementById('moonIcon');
    var currentTheme = document.documentElement.getAttribute('data-theme') || 'light';

    function applyTheme(t) {
      document.documentElement.setAttribute('data-theme', t);
      document.documentElement.style.colorScheme = t === 'dark' ? 'dark' : 'light';
      localStorage.setItem('mojaz24-theme', t);
      sunIcon.style.display = t === 'dark' ? 'block' : 'none';
      moonIcon.style.display = t === 'light' ? 'block' : 'none';
    }

    applyTheme(currentTheme);

    themeBtn.addEventListener('click', function() {
      currentTheme = currentTheme === 'light' ? 'dark' : 'light';
      applyTheme(currentTheme);
    });
  </script>
</body>
</html>
